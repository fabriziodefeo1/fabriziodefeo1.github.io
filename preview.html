        :root{--bg:#000;--fg:#fff;--muted:#a1a1a1;--accent:#FF6600;--line:#1a1a1a;--card:#0a0a0a;--radius:14px}
        *{box-sizing:border-box} html{scroll-behavior:smooth;background:var(--bg)}
        body{margin:0;background:var(--bg);color:var(--fg);font-family:ui-sans,system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
        a{color:inherit;text-decoration:none} button{font:inherit} img{display:block;max-width:100%}
        .wrap{max-width:1160px;margin:0 auto;padding:0 20px}
        .divider{width:60px;height:3px;background:var(--accent);border:0;margin:18px 0}
        .uppercase{letter-spacing:.14em;text-transform:uppercase}
        .tight{letter-spacing:-.03em}
        /* Header */
        .header{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(0,0,0,.72);backdrop-filter:saturate(1.2) blur(10px);border-bottom:1px solid var(--line)}
        .header-inner{height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
        .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.14em}
        .brand img{width:28px;height:28px;object-fit:contain}
        .nav{display:flex;gap:22px;align-items:center}
        .nav a{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#cfcfcf}
        .nav a:hover{color:#fff}
        .icon-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #222;border-radius:999px;background:#0a0a0a;cursor:pointer;transition:.18s}
        .icon-btn:hover{border-color:#333;transform:translateY(-1px)}
        .badge{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;padding:0 6px;border-radius:999px;background:var(--accent);color:#000;font-weight:800;font-size:11px;display:grid;place-items:center;line-height:1;transform-origin:center}
        .badge.pop{animation:pop .45s cubic-bezier(.34,1.56,.64,1)}
        @keyframes pop{0%{transform:scale(.6)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
        .mobile-toggle{display:none}
        /* Hero */
        .hero{padding:132px 0 84px;border-bottom:1px solid var(--line);text-align:center;position:relative;overflow:hidden}
        .hero h1{font-size:clamp(40px,8vw,96px);line-height:.9;font-weight:900;letter-spacing:-.04em;text-transform:uppercase;margin:0}
        .hero h1 span.accent{color:var(--accent)}
        .hero p{max-width:560px;margin:18px auto 0;color:#b8b8b8;font-size:16px;line-height:1.6}
        .hero-cta{margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
        .btn{appearance:none;border:1px solid transparent;border-radius:999px;padding:13px 22px;font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:8px}
        .btn-primary{background:var(--accent);color:#000}
        .btn-primary:hover{filter:brightness(1.05);transform:translateY(-1px)}
        .btn-ghost{background:transparent;color:#fff;border-color:#2a2a2a}
        .btn-ghost:hover{border-color:#444;background:#111}
        /* Sections */
        section{padding:72px 0;border-bottom:1px solid var(--line)}
        .kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:800}
        .h2{font-size:clamp(28px,4vw,44px);line-height:1.05;font-weight:900;letter-spacing:-.02em;text-transform:uppercase;margin:10px 0 0}
        .muted{color:#9a9a9a;line-height:1.7}
        /* About grid */
        .about-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:start}
        @media(max-width:860px){.about-grid{grid-template-columns:1fr}}
        /* Products */
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
        @media(max-width:760px){.grid2{grid-template-columns:1fr}}
        .card{background:var(--card);border:1px solid #151515;border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
        .product-img{position:relative;aspect-ratio:4/5;background:#0f0f0f;overflow:hidden;cursor:pointer}
        .product-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .35s ease, transform .6s ease}
        .product-img img.label{opacity:0}
        .product-img:hover img.main,
        .product-img.active img.main{opacity:0;transform:scale(1.03)}
        .product-img:hover img.label,
        .product-img.active img.label{opacity:1;transform:scale(1.02)}
        .product-img .tag{position:absolute;left:12px;top:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);border:1px solid #222;color:#fff;font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:7px 9px;border-radius:999px}
        .card-body{padding:16px 16px 14px;display:flex;flex-direction:column;gap:12px}
        .price-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
        .price{font-weight:800;letter-spacing:-.02em}
        .sizes{display:flex;gap:8px;flex-wrap:wrap}
        .size-btn{min-width:38px;height:36px;padding:0 10px;border-radius:999px;border:1px solid #262626;background:#111;color:#d0d0d0;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;cursor:pointer;transition:.16s}
        .size-btn[aria-pressed="true"]{background:#fff;color:#000;border-color:#fff}
        .size-btn:hover{border-color:#3a3a3a}
        /* Shipping */
        .ship-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
        @media(max-width:860px){.ship-grid{grid-template-columns:1fr}}
        .ship-card{border:1px solid #151515;background:#0a0a0a;border-radius:14px;padding:18px;display:flex;gap:14px;align-items:flex-start}
        .ship-icon{width:40px;height:40px;border-radius:10px;background:#111;border:1px solid #1e1e1e;display:grid;place-items:center;flex:0 0 auto}
        /* Cart drawer */
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.56);backdrop-filter:blur(2px);z-index:60;opacity:0;pointer-events:none;transition:.22s}
        .overlay.open{opacity:1;pointer-events:auto}
        .drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,100%);background:#080808;border-left:1px solid #1a1a1a;z-index:70;transform:translateX(100%);transition:transform .28s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column}
        .drawer.open{transform:translateX(0)}
        .drawer-head{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid #151515}
        .drawer-body{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
        .cart-item{display:flex;gap:12px;padding:12px;border:1px solid #161616;border-radius:12px;background:#0c0c0c}
        .cart-item img{width:68px;height:84px;object-fit:cover;border-radius:8px;background:#111}
        .qty{display:inline-flex;align-items:center;border:1px solid #232323;border-radius:999px;overflow:hidden}
        .qty button{width:30px;height:30px;background:transparent;border:0;color:#fff;cursor:pointer}
        .qty span{min-width:28px;text-align:center;font-size:13px}
        .drawer-foot{padding:16px;border-top:1px solid #151515;background:#0a0a0a}
        .bar{height:6px;background:#1a1a1a;border-radius:999px;overflow:hidden;margin:10px 0 14px}
        .bar>i{display:block;height:100%;background:var(--accent);width:0%;transition:width .35s ease}
        .row{display:flex;justify-content:space-between;font-size:13px;color:#bdbdbd;margin:6px 0}
        .row strong{color:#fff}
        /* Footer */
        footer{padding:36px 0 48px;color:#8a8a8a;font-size:12px;letter-spacing:.06em}
        footer .foot{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center;border-top:1px solid #141414;padding-top:18px}
        /* A11y */
        :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
        @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
